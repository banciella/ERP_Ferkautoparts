<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Transações - FERKAUTOPARTS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        
       body {
    background: #0A2A4A;
    min-height: 100vh;
    background-image: url('bg.png');
    background-repeat: no-repeat;
    background-position: center;
    background-size: cover;
    background-attachment: fixed;
}
        
        /* SIDEBAR */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            padding: 25px 20px;
            transition: transform 0.3s ease;
            z-index: 100;
        }
        
        .sidebar .logo {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        
        .sidebar .logo h2 {
            color: white;
            font-size: 22px;
        }
        
        .sidebar .logo p {
            color: #2ecc71;
            font-size: 10px;
            letter-spacing: 2px;
            margin-top: 5px;
        }
        
        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 12px 15px;
            margin: 8px 0;
            border-radius: 10px;
            transition: 0.3s;
        }
        
        .sidebar a:hover, .sidebar a.active {
            background: #2ecc71;
        }
        
        .sidebar-user {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .sidebar-user .avatar {
            width: 40px;
            height: 40px;
            background: #2ecc71;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        
        .sidebar-user .info h4 { color: white; font-size: 14px; }
        .sidebar-user .info p { color: rgba(255,255,255,0.6); font-size: 11px; }
        
        /* MAIN */
        .main {
            margin-left: 260px;
            padding: 20px;
            transition: margin-left 0.3s ease;
        }
        
        /* TOPBAR */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.3);
            padding: 15px 25px;
            border-radius: 12px;
            margin-bottom: 25px;
        }
        
        .topbar h1 { color: white; font-size: 22px; }
        
        .logout-btn {
            background: #e74c3c;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        
        /* MENU HAMBURGUER - SEMPRE VISÍVEL */
        .hamburger {
            display: block;
            font-size: 28px;
            color: white;
            cursor: pointer;
            background: none;
            border: none;
            margin-right: 15px;
        }
        
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 99;
        }
        
        /* SIDEBAR FECHADA POR PADRÃO */
        .sidebar {
            transform: translateX(-100%);
        }
        
        .sidebar.open {
            transform: translateX(0);
        }
        
        .main {
            margin-left: 0;
        }
        
        /* CARDS RESUMO */
        .resumo-cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .resumo-card {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }
        
        .resumo-card h3 { color: rgba(255,255,255,0.7); font-size: 12px; margin-bottom: 8px; }
        .resumo-card .numero { font-size: 28px; font-weight: bold; color: #2ecc71; }
        .resumo-card .label { color: rgba(255,255,255,0.5); font-size: 11px; margin-top: 5px; }
        
        /* FILTROS */
        .filtros {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }
        
        .filtros input, .filtros select {
            padding: 10px 15px;
            border-radius: 8px;
            border: none;
            background: rgba(255,255,255,0.15);
            color: white;
            outline: none;
        }
        
        .filtros input { flex: 2; min-width: 150px; }
        .filtros select { flex: 1; min-width: 120px; }
        .filtros input::placeholder { color: rgba(255,255,255,0.6); }
        .filtros select option { background: #0A2A4A; }
        
        .btn-limpar {
            background: #e74c3c;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }
        
        /* TABELA */
        .tabela-container {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            text-align: left;
            padding: 15px;
            color: #2ecc71;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        td {
            padding: 12px 15px;
            color: white;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .tx-entrada {
            background: rgba(46,204,113,0.2);
            color: #2ecc71;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
            font-size: 12px;
            font-weight: bold;
        }
        
        .tx-saida {
            background: rgba(231,76,60,0.2);
            color: #e74c3c;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
            font-size: 12px;
            font-weight: bold;
        }
        
        .sem-dados {
            text-align: center;
            padding: 40px;
            color: rgba(255,255,255,0.5);
        }
        
        /* BOTÃO LIBRAS */
        .vlibras-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 55px;
            height: 55px;
            background: #2ecc71;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 9999;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: 0.3s;
            border: 2px solid rgba(255,255,255,0.3);
            font-size: 28px;
        }
        
        .vlibras-btn:hover {
            transform: scale(1.05);
            background: #27ae60;
        }
        
        /* RESPONSIVO */
        @media (max-width: 768px) {
            .main { padding: 15px; }
            .resumo-cards { grid-template-columns: repeat(2, 1fr); }
            .filtros { flex-direction: column; }
            .filtros input, .filtros select { width: 100%; }
            .vlibras-btn { width: 45px; height: 45px; font-size: 22px; }
        }
        
        @media (max-width: 480px) {
            .resumo-cards { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <div class="logo">
        <h2>FERKAUTOPARTS</h2>
        <p>PEÇAS AUTOMOTIVAS</p>
    </div>
    <a href="Produtos.html">📦 Produtos</a>
    <a href="Estoque.html">📊 Estoque</a>
    <a href="Transacoes.html" class="active">🔄 Transações</a>
    <div class="sidebar-user">
        <div class="avatar" id="userAvatar">A</div>
        <div class="info">
            <h4 id="userNome">Administrador</h4>
            <p id="userPerfil">admin</p>
        </div>
    </div>
</div>

<!-- OVERLAY -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- MAIN -->
<div class="main">
    <div class="topbar">
        <button class="hamburger" id="hamburgerBtn">☰</button>
        <h1>🔄 Transações</h1>
        <button class="logout-btn" id="logoutBtn">Sair</button>
    </div>
    
    <div class="resumo-cards">
        <div class="resumo-card"><h3>Total Movimentações</h3><div class="numero" id="totalMov">0</div><div class="label">registros</div></div>
        <div class="resumo-card"><h3>📥 Entradas</h3><div class="numero" id="totalEntradas">0</div><div class="label">unidades</div></div>
        <div class="resumo-card"><h3>📤 Saídas</h3><div class="numero" id="totalSaidas">0</div><div class="label">unidades</div></div>
        <div class="resumo-card"><h3>🏆 Mais Vendido</h3><div class="numero" id="maisVendido" style="font-size: 14px;">-</div><div class="label">produto</div></div>
    </div>
    
    <div class="filtros">
        <input type="text" id="buscaObs" placeholder="🔍 Buscar por observação...">
        <select id="filtroTipo">
            <option value="">Todos os tipos</option>
            <option value="entrada">📥 Apenas Entradas</option>
            <option value="saida">📤 Apenas Saídas</option>
        </select>
        <select id="filtroProduto">
            <option value="">Todos os produtos</option>
        </select>
        <select id="filtroPeriodo">
            <option value="">Todo período</option>
            <option value="hoje">📅 Hoje</option>
            <option value="semana">📅 Esta semana</option>
            <option value="mes">📅 Este mês</option>
        </select>
        <button class="btn-limpar" id="limparFiltros">Limpar Filtros</button>
    </div>
    
    <div class="tabela-container">
        <table>
            <thead>
                <tr><th>Data/Hora</th><th>Produto</th><th>Tipo</th><th>Quantidade</th><th>Estoque após</th><th>Observação</th></tr>
            </thead>
            <tbody id="tabelaTransacoes"></tbody>
        </table>
    </div>
</div>

<!-- LIBRAS -->
<div class="vlibras-btn" id="vlibrasBtn">🤟</div>
<div vw class="enabled">
    <div vw-access-button class="active"></div>
    <div vw-plugin-wrapper>
        <div class="vw-plugin-top-wrapper"></div>
    </div>
</div>

<script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
<script>
    // ============================================================
    // BANCO DE DADOS - PRODUTOS E TRANSAÇÕES
    // ============================================================
    let PRODUTOS = [
        { id: 1, nome: 'Pastilha de Freio Dianteira' }, { id: 2, nome: 'Disco de Freio Ventilado' }, 
        { id: 3, nome: 'Filtro de Ar do Motor' }, { id: 4, nome: 'Filtro de Óleo' }, 
        { id: 5, nome: 'Filtro de Combustível' }, { id: 6, nome: 'Amortecedor Dianteiro' },
        { id: 7, nome: 'Amortecedor Traseiro' }, { id: 8, nome: 'Kit Embreagem Completo' }, 
        { id: 9, nome: 'Correia Dentada' }, { id: 10, nome: 'Correia do Alternador' },
        { id: 11, nome: 'Jogo de Velas' }, { id: 12, nome: 'Bobina de Ignição' },
        { id: 13, nome: 'Bateria Automotiva 60Ah' }, { id: 14, nome: 'Bomba de Combustível' },
        { id: 15, nome: 'Radiador' }, { id: 16, nome: 'Ventoinha do Radiador' },
        { id: 17, nome: 'Sensor de Oxigênio' }, { id: 18, nome: 'Sensor MAP' },
        { id: 19, nome: 'Alternador 120A' }, { id: 20, nome: 'Motor de Partida' },
        { id: 21, nome: 'Rolamento de Roda' }, { id: 22, nome: 'Terminal de Direção' },
        { id: 23, nome: 'Pivô de Suspensão' }, { id: 24, nome: 'Braço de Suspensão' },
        { id: 25, nome: 'Kit Correia + Tensor' }, { id: 26, nome: 'Óleo de Motor 5W30 (1L)' },
        { id: 27, nome: 'Fluido de Freio DOT4' }, { id: 28, nome: 'Aditivo de Radiador' },
        { id: 29, nome: 'Limpador de Para-brisa' }, { id: 30, nome: 'Cabo de Vela' }
    ];
    
    let TRANSACOES = [
        { id: 1, produtoId: 1, produtoNome: 'Pastilha de Freio Dianteira', tipo: 'entrada', quantidade: 50, data: '2026-05-15T09:30:00', obs: 'Reposição inicial', estoqueApos: 170 },
        { id: 2, produtoId: 19, produtoNome: 'Alternador 120A', tipo: 'saida', quantidade: 2, data: '2026-05-15T14:20:00', obs: 'Venda para cliente João', estoqueApos: 6 },
        { id: 3, produtoId: 20, produtoNome: 'Motor de Partida', tipo: 'saida', quantidade: 1, data: '2026-05-16T11:00:00', obs: 'Troca em garantia', estoqueApos: 8 },
        { id: 4, produtoId: 4, produtoNome: 'Filtro de Óleo', tipo: 'entrada', quantidade: 100, data: '2026-05-16T08:00:00', obs: 'Compra fornecedor', estoqueApos: 250 },
        { id: 5, produtoId: 11, produtoNome: 'Jogo de Velas', tipo: 'saida', quantidade: 10, data: '2026-05-17T16:45:00', obs: 'Oficina parceira', estoqueApos: 80 },
        { id: 6, produtoId: 8, produtoNome: 'Kit Embreagem Completo', tipo: 'entrada', quantidade: 5, data: '2026-05-17T10:15:00', obs: 'Reposição', estoqueApos: 15 },
        { id: 7, produtoId: 9, produtoNome: 'Correia Dentada', tipo: 'saida', quantidade: 3, data: '2026-05-18T09:00:00', obs: 'Venda balcão', estoqueApos: 137 }
    ];
    
    function formatarData(d) { 
        return new Date(d).toLocaleDateString('pt-BR') + ' ' + new Date(d).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }); 
    }
    
    function salvarDados() { localStorage.setItem('ferka_transacoes', JSON.stringify(TRANSACOES)); }
    function carregarDados() { const t = localStorage.getItem('ferka_transacoes'); if (t) TRANSACOES = JSON.parse(t); }
    carregarDados();
    
    // INICIAR LIBRAS
    new window.VLibras.Widget('https://vlibras.gov.br/app');
    document.getElementById('vlibrasBtn').onclick = () => {
        const btn = document.querySelector('[vw-access-button]');
        if (btn) btn.click();
    };
    
    // VERIFICAR LOGIN
    const usuario = JSON.parse(sessionStorage.getItem('usuario'));
    if (!usuario) window.location.href = 'Login.html';
    document.getElementById('userNome').textContent = usuario.nome;
    document.getElementById('userAvatar').textContent = usuario.nome.charAt(0);
    document.getElementById('userPerfil').textContent = usuario.login;
    document.getElementById('logoutBtn').onclick = () => { sessionStorage.clear(); window.location.href = 'Login.html'; };
    
    // MENU HAMBURGUER
    const hamburgerBtn = document.getElementById('hamburgerBtn');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    if (hamburgerBtn) {
        hamburgerBtn.addEventListener('click', function() {
            sidebar.classList.toggle('open');
            if (overlay) overlay.style.display = 'block';
        });
    }
    if (overlay) {
        overlay.addEventListener('click', function() {
            sidebar.classList.remove('open');
            overlay.style.display = 'none';
        });
    }
    
    function popularSelectProdutos() {
        const select = document.getElementById('filtroProduto');
        select.innerHTML = '<option value="">Todos os produtos</option>';
        PRODUTOS.forEach(p => {
            select.innerHTML += `<option value="${p.id}">${p.nome}</option>`;
        });
    }
    
    function verificarPeriodo(data, periodo) {
        const d = new Date(data);
        const h = new Date();
        h.setHours(0, 0, 0, 0);
        if (periodo === 'hoje') return d.toDateString() === h.toDateString();
        if (periodo === 'semana') {
            const i = new Date(h);
            i.setDate(h.getDate() - h.getDay());
            return d >= i;
        }
        if (periodo === 'mes') return d.getMonth() === h.getMonth() && d.getFullYear() === h.getFullYear();
        return true;
    }
    
    function renderizarTransacoes() {
        const busca = document.getElementById('buscaObs').value.toLowerCase();
        const tipo = document.getElementById('filtroTipo').value;
        const produtoId = document.getElementById('filtroProduto').value;
        const periodo = document.getElementById('filtroPeriodo').value;
        
        let filtradas = [...TRANSACOES].sort((a,b) => new Date(b.data) - new Date(a.data));
        
        if (busca) filtradas = filtradas.filter(t => t.obs.toLowerCase().includes(busca));
        if (tipo) filtradas = filtradas.filter(t => t.tipo === tipo);
        if (produtoId) filtradas = filtradas.filter(t => t.produtoId == produtoId);
        if (periodo) filtradas = filtradas.filter(t => verificarPeriodo(t.data, periodo));
        
        const tbody = document.getElementById('tabelaTransacoes');
        if (filtradas.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="sem-dados">📭 Nenhuma transação encontrada</td></tr>';
        } else {
            tbody.innerHTML = filtradas.map(t => `
                <tr>
                    <td style="white-space: nowrap">${formatarData(t.data)}</td>
                    <td><strong>${t.produtoNome}</strong></td>
                    <td><span class="${t.tipo === 'entrada' ? 'tx-entrada' : 'tx-saida'}">${t.tipo === 'entrada' ? '➕ ENTRADA' : '➖ SAÍDA'}</span></td>
                    <td style="font-weight:bold; ${t.tipo === 'entrada' ? 'color:#2ecc71' : 'color:#e74c3c'}">${t.tipo === 'entrada' ? '+' : '-'} ${t.quantidade}</td>
                    <td>${t.estoqueApos || '—'}</td>
                    <td class="obs-cell">${t.obs || '—'}</td>
                </td>
            `).join('');
        }
        
        const totalEntradas = TRANSACOES.filter(t => t.tipo === 'entrada').reduce((s, t) => s + t.quantidade, 0);
        const totalSaidas = TRANSACOES.filter(t => t.tipo === 'saida').reduce((s, t) => s + t.quantidade, 0);
        
        document.getElementById('totalMov').textContent = TRANSACOES.length;
        document.getElementById('totalEntradas').textContent = totalEntradas;
        document.getElementById('totalSaidas').textContent = totalSaidas;
        
        const vendas = {};
        TRANSACOES.filter(t => t.tipo === 'saida').forEach(t => {
            vendas[t.produtoNome] = (vendas[t.produtoNome] || 0) + t.quantidade;
        });
        let mais = '-', max = 0;
        for (const [nome, qtd] of Object.entries(vendas)) {
            if (qtd > max) { max = qtd; mais = nome; }
        }
        document.getElementById('maisVendido').textContent = mais !== '-' ? `${mais.substring(0, 20)}... (${max})` : '-';
    }
    
    function limparFiltros() {
        document.getElementById('buscaObs').value = '';
        document.getElementById('filtroTipo').value = '';
        document.getElementById('filtroProduto').value = '';
        document.getElementById('filtroPeriodo').value = '';
        renderizarTransacoes();
    }
    
    document.getElementById('buscaObs').addEventListener('input', renderizarTransacoes);
    document.getElementById('filtroTipo').addEventListener('change', renderizarTransacoes);
    document.getElementById('filtroProduto').addEventListener('change', renderizarTransacoes);
    document.getElementById('filtroPeriodo').addEventListener('change', renderizarTransacoes);
    document.getElementById('limparFiltros').addEventListener('click', limparFiltros);
    
    popularSelectProdutos();
    renderizarTransacoes();
</script>
</body>
</html>
