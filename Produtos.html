                height: 45px;
                bottom: 15px;
                right: 15px;

    </style>
</head>

    function formatarMoeda(v) { return 'R$ ' + v.toLocaleString('pt-BR', { minimumFractionDigits: 2 }); }
    function getStatusClass(e) { return e < 10 ? 'status-critico' : (e < 30 ? 'status-baixo' : 'status-normal'); }

    function exportarJSON() {
        const dados = { produtos: PRODUTOS, transacoes: TRANSACOES, dataExportacao: new Date().toISOString(), totalProdutos: PRODUTOS.length, valorTotalEstoque: PRODUTOS.reduce((t,p)=> t + (p.estoque*p.preco),0) };
        const blob = new Blob([JSON.stringify(dados, null, 2)], { type: 'application/json' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'dados_estoque.json';
        link.click();
        URL.revokeObjectURL(link.href);
        alert('✅ Dados exportados!');
    }
    
    function gerarRelatorio() {
        const total = PRODUTOS.length;
        const valorTotal = PRODUTOS.reduce((t,p) => t + (p.estoque*p.preco),0);
        const criticos = PRODUTOS.filter(p => p.estoque < 10);
        const alerta = PRODUTOS.filter(p => p.estoque >= 10 && p.estoque < 30);
        const saudaveis = PRODUTOS.filter(p => p.estoque >= 30);
        const categorias = {};
        PRODUTOS.forEach(p => {
            if (!categorias[p.categoria]) categorias[p.categoria] = { count: 0, valor: 0, produtos: [] };
            categorias[p.categoria].count++;
            categorias[p.categoria].valor += p.estoque * p.preco;
            categorias[p.categoria].produtos.push(p);
        });
        let relatorio = `╔══════════════════════════════════════════════════════════════════╗

║              Data: ${new Date().toLocaleString('pt-BR')}               ║
╚══════════════════════════════════════════════════════════════════╝

📊 RESUMO GERAL

• Total de produtos: ${total}
• Valor total em estoque: R$ ${valorTotal.toFixed(2).replace('.', ',')}
• Produtos saudáveis (≥30): ${saudaveis.length}
• Produtos em alerta (10-29): ${alerta.length}
• Produtos CRÍTICOS (<10): ${criticos.length}

⚠️ PRODUTOS CRÍTICOS (URGENTE!)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
`;
        criticos.forEach(p => { relatorio += `• ${p.nome} (SKU: ${p.sku}) - Estoque: ${p.estoque} - Preço: R$ ${p.preco.toFixed(2).replace('.', ',')}\n`; });
        relatorio += `\n📁 PRODUTOS POR CATEGORIA\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
        for (const [cat, dados] of Object.entries(categorias)) { relatorio += `\n${cat}: ${dados.count} produtos | Valor: R$ ${dados.valor.toFixed(2).replace('.', ',')}\n`; dados.produtos.forEach(p => { relatorio += `   • ${p.nome}: ${p.estoque} un.\n`; }); }

    const usuario = JSON.parse(sessionStorage.getItem('usuario'));
    if (!usuario) window.location.href = 'Login.html';
    document.getElementById('userNome').textContent = usuario.nome;
    document.getElementById('userAvatar').textContent = usuario.nome.charAt(0);
    document.getElementById('userPerfil').textContent = usuario.login;
    document.getElementById('logoutBtn').onclick = () => { sessionStorage.clear(); window.location.href = 'Login.html'; };
    
    // MENU HAMBURGUER
    const hamburgerBtn = document.getElementById('hamburgerBtn');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    if (hamburgerBtn) { hamburgerBtn.addEventListener('click', function() { sidebar.classList.toggle('open'); if (overlay) overlay.style.display = 'block'; }); }
    if (overlay) { overlay.addEventListener('click', function() { sidebar.classList.remove('open'); overlay.style.display = 'none'; }); }
    
    document.getElementById('btnExportarJSON').onclick = exportarJSON;
    document.getElementById('btnRelatorio').onclick = gerarRelatorio;
    
    const tbody = document.getElementById('tabelaProdutos');
    const buscaInput = document.getElementById('busca');
    const filtroCat = document.getElementById('filtroCategoria');
    const filtroEst = document.getElementById('filtroEstoque');
    const modal = document.getElementById('modalProduto');
    const modalTitulo = document.getElementById('modalTitulo');
    
    function popularCategorias() { const cats = [...new Set(PRODUTOS.map(p => p.categoria))]; filtroCat.innerHTML = '<option value="">Todas categorias</option>' + cats.map(c => `<option value="${c}">${c}</option>`).join(''); }
    function renderizarTabela() {
        const busca = buscaInput.value.toLowerCase();
        const categoria = filtroCat.value;
        const filtroEstoqueValor = filtroEst.value;
        let filtrados = PRODUTOS.filter(p => { const matchBusca = p.nome.toLowerCase().includes(busca) || p.sku.includes(busca); const matchCat = !categoria || p.categoria === categoria; let matchEst = true; if (filtroEstoqueValor === 'critico') matchEst = p.estoque < 10; else if (filtroEstoqueValor === 'baixo') matchEst = p.estoque >= 10 && p.estoque < 30; else if (filtroEstoqueValor === 'normal') matchEst = p.estoque >= 30; return matchBusca && matchCat && matchEst; });
        if (filtrados.length === 0) { tbody.innerHTML = '<tr><td colspan="6">Nenhum produto encontrado</td></tr>'; return; }
        tbody.innerHTML = filtrados.map(p => `<tr><td>${p.sku}</td><td><strong>${p.nome}</strong></td><td>${p.categoria}</td><td><span class="${getStatusClass(p.estoque)}">${p.estoque} • ${getStatusTexto(p.estoque)}</span></td><td>${formatarMoeda(p.preco)}</td><td class="acoes"><button onclick="editarProduto(${p.id})">✏️</button><button onclick="movimentar(${p.id},'entrada')">+</button><button onclick="movimentar(${p.id},'saida')">-</button><button onclick="excluirProduto(${p.id})">🗑️</button></tr>`).join('');
    }
    
    window.editarProduto = function(id) { const p = PRODUTOS.find(p => p.id === id); if (!p) return; document.getElementById('produtoId').value = p.id; document.getElementById('produtoSku').value = p.sku; document.getElementById('produtoNome').value = p.nome; document.getElementById('produtoCategoria').value = p.categoria; document.getElementById('produtoEstoque').value = p.estoque; document.getElementById('produtoPreco').value = p.preco; modalTitulo.textContent = 'Editar Produto'; modal.style.display = 'flex'; };
    window.excluirProduto = function(id) { if (confirm('Excluir produto?')) { PRODUTOS = PRODUTOS.filter(p => p.id !== id); salvarDados(); popularCategorias(); renderizarTabela(); } };
    window.movimentar = function(id, tipo) { const p = PRODUTOS.find(p => p.id === id); const qtd = parseInt(prompt(`${tipo === 'entrada' ? 'ENTRADA' : 'SAÍDA'} de ${p.nome}\nQuantidade:`)); if (isNaN(qtd) || qtd <= 0) return; if (tipo === 'saida' && qtd > p.estoque) { alert(`Estoque insuficiente!`); return; } p.estoque += tipo === 'entrada' ? qtd : -qtd; TRANSACOES.push({ id: nextTxId++, produtoId: p.id, produtoNome: p.nome, tipo, quantidade: qtd, data: new Date().toISOString(), obs: tipo === 'entrada' ? 'Compra' : 'Venda' }); salvarDados(); renderizarTabela(); alert(`${tipo === 'entrada' ? 'Entrada' : 'Saída'} de ${qtd} un. registrada!`); };
    function salvarProduto() { const id = document.getElementById('produtoId').value; const sku = document.getElementById('produtoSku').value; const nome = document.getElementById('produtoNome').value; const categoria = document.getElementById('produtoCategoria').value; const estoque = parseInt(document.getElementById('produtoEstoque').value); const preco = parseFloat(document.getElementById('produtoPreco').value); if (!nome || !categoria || isNaN(estoque) || isNaN(preco)) { alert('Preencha tudo!'); return; } if (id) { const idx = PRODUTOS.findIndex(p => p.id == id); if (idx !== -1) PRODUTOS[idx] = { ...PRODUTOS[idx], sku, nome, categoria, estoque, preco }; } else { PRODUTOS.push({ id: nextId++, sku: sku || String(nextId).padStart(6,'0'), nome, categoria, estoque, preco }); } salvarDados(); modal.style.display = 'none'; popularCategorias(); renderizarTabela(); alert('Produto salvo!'); }
    document.getElementById('btnNovo').onclick = () => { document.getElementById('produtoId').value = ''; document.getElementById('produtoSku').value = ''; document.getElementById('produtoNome').value = ''; document.getElementById('produtoCategoria').value = ''; document.getElementById('produtoEstoque').value = ''; document.getElementById('produtoPreco').value = ''; modalTitulo.textContent = 'Novo Produto'; modal.style.display = 'flex'; };
    document.getElementById('cancelarModal').onclick = () => modal.style.display = 'none';
    document.getElementById('salvarProduto').onclick = salvarProduto;
    buscaInput.oninput = renderizarTabela;
    filtroCat.onchange = renderizarTabela;
    filtroEst.onchange = renderizarTabela;
    window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };
    popularCategorias();
    renderizarTabela();
</script>
</body>
</html>
